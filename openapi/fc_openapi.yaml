  /assets/{id}/provenance:
    post:
      tags:
        - Assets
      summary: Attach a provenance credential to an asset version.
      description: >
        Stores a VC 2.0 JSON-LD or VC-JWT provenance credential against the given asset version.
        If version is omitted the current version is used.


        Two `credentialSubject` shapes are accepted:


          - *Entity-centric* — `credentialSubject.id` equals `{assetId}:v{N}`. The versioned-asset
            IRI becomes the graph subject; the projected PROV-O triples decorate that subject.
          - *Activity-centric* — `credentialSubject.id` is the activity's own IRI (any absolute
            IRI). The credential MUST then declare `prov:generated` or `prov:used` (compact or
            expanded form) pointing at `{assetId}:v{N}` so the activity links back to a versioned
            asset. The activity IRI becomes the graph subject; the projected triples form the
            activity's star of relations.


        credentialSubject MUST declare at least one — and MAY declare several — of the supported
        W3C PROV-O predicates: prov:wasGeneratedBy, prov:wasDerivedFrom, prov:wasAttributedTo,
        prov:wasRevisionOf, prov:generated, prov:used, prov:wasAssociatedWith,
        prov:actedOnBehalfOf (compact prov:X or expanded http://www.w3.org/ns/prov#X form). Every
        recognised predicate is projected to the graph store as its own triple under the resolved
        graph subject; the predicate that appears first on credentialSubject is also recorded as
        the row's provenanceType for relational filtering.


        Attaching a provenance credential does not advance the asset version counter (the counter
        reflects distinct content hashes, not metadata events). VC 1.1 payloads and credentials
        using the CAT-internal namespace are rejected with 400. Duplicate credentialId returns 409.
        Required permission: ASSET_UPDATE or ADMIN_ALL
      operationId: addProvenanceCredential
      security:
        - jwt: []
      parameters:
        - name: id
          in: path
          description: IRI identifier of the asset
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: 1-based target version ordinal. Defaults to the current version.
          required: false
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: string
              description: VC 2.0 JSON-LD payload
          application/vc+jwt:
            schema:
              type: string
              description: VC-JWT compact serialization
          application/json:
            schema:
              type: string
              description: VC 2.0 JSON-LD payload
      responses:
        '201':
          description: Provenance credential stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvenanceCredential'
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      tags:
        - Assets
      summary: List provenance credentials for an asset.
      description: >
        Returns a paginated list of provenance credentials sorted by issuedAt descending.
        Optionally filter by version. Required permission: ASSET_READ or ADMIN_ALL
      operationId: listProvenanceCredentials
      security:
        - jwt: []
      parameters:
        - name: id
          in: path
          description: IRI identifier of the asset
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: Filter by 1-based version ordinal.
          required: false
          schema:
            type: integer
            minimum: 1
        - name: page
          in: query
          description: 0-based page index.
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size (1–100).
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated provenance credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvenanceCredentials'
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /assets/{id}/provenance/verify:
    post:
      tags:
        - Assets
      summary: Verify all provenance credentials for an asset.
      description: >
        Verifies all provenance credentials for the asset (optionally filtered by version).

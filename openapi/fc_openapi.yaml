  /assets/{asset_hash}:
    delete:
      tags:
        - Assets
      summary: Completely delete an asset by its content hash
      description: >
        Unlike other asset endpoints which use IRI-based identification (/assets/{id}),
        the delete operation uses the SHA-256 content hash to guarantee unambiguous
        single-row targeting. See ADR 7 — Delete Operation Exception.


        For idempotent cascade-by-IRI semantics (every version, every linked companion, every
        provenance row), prefer DELETE /assets/by-id/{id}.
      operationId: deleteAsset
      security:
        - jwt: [ ]
      parameters:
        - name: asset_hash
          in: path
          description: Hash identifier of the asset
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /assets/by-id/{id}:
    delete:
      tags:
        - Assets
      summary: Delete an asset and its linked companions by IRI
      description: >
        Removes the live asset row, any linked human-readable companion, and all associated
        provenance credentials for the asset identified by `id` (URL-encoded asset IRI).
        Historical audit revisions are preserved by design — see
        chapter 05_building_block_view of the architecture document.
        Data-subject-erasure requirements that demand audit-row removal are out of scope of this
        endpoint. The operation is idempotent — repeated calls on the same id return 204 even if
        no rows remain.

        Cross-participant scoping: when a live row is present, the caller's `participant_id` claim
        must match the issuer recorded on that row, otherwise the request is refused with 403.
        Requests against an unknown id always succeed with 204 and reveal nothing about the
        catalogue's contents.
      operationId: deleteAssetById
      security:
        - jwt: [ ]
      parameters:
        - name: id
          in: path
          description: URL-encoded asset IRI (subject identifier).
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deletion accepted (idempotent; no body)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

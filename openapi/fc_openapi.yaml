  /assets/{id}/human-readable:
    post:
      tags:
        - Assets
      summary: Upload and link a human-readable representation to a machine-readable asset
      description: >
        Uploads a human-readable document (e.g. PDF) and links it bidirectionally
        to the existing machine-readable asset identified by {id}. The human-readable document
        is stored as an independent asset with its own IRI.


        The uploaded part's Content-Type is matched against a family-aware allowlist intersected
        with a script-execution denylist. Admitted by default:


          - inert document and structured-data types — `application/pdf`, the Office Open XML word
            document type, `application/json`, `application/ld+json`, `application/xml`, and the
            YAML media types (`application/yaml`, `application/x-yaml`);
          - the entire `text/*` family (e.g. `text/plain`, `text/html`, `text/markdown`,
            `text/csv`);
          - the entire `image/*`, `audio/*`, and `video/*` families (e.g. `image/png`,
            `audio/mpeg`, `video/mp4`).


        Refused regardless of family — these types either execute in the browser when echoed
        back as the stored `Content-Type`, or carry opaque-binary risk:


          - scripting media types (`text/javascript`, `text/ecmascript`, `text/vbscript`,
            `application/javascript`, `application/ecmascript`, `application/x-javascript`);
          - `image/svg+xml` (SVG can carry inline script);
          - opaque or native-executable types (`application/octet-stream`,
            `application/x-msdownload`, `application/x-executable`, `application/x-sh`,
            `application/x-shockwave-flash`, `application/x-httpd-php`).


        Any other value is rejected with `400`. Operators can override both the allowlist and the
        denylist via the `federated-catalogue.assets.human-readable-content-types` and
        `human-readable-content-type-denylist` properties. Linking a companion does not advance
        the machine-readable asset's version counter.


        Multipart uploads are handled by the server outside the generated delegate pattern.
        Required permission: ASSET_CREATE or ADMIN_ALL
      operationId: uploadHumanReadable
      security:
        - jwt: []
      parameters:
        - name: id
          in: path
          description: IRI of the machine-readable asset to link to
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Human-readable document (e.g. PDF)
      responses:
        '201':
          description: Created — the human-readable asset was stored and linked
          headers:
            location:
              description: URL of the new human-readable asset.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
        - Assets
      summary: Replace the human-readable representation linked to a machine-readable asset
      description: >
        Replaces the content of an existing human-readable document linked to the machine-readable asset
        identified by {id}. The human-readable asset must already be linked — use POST to create the
        initial link. The IRI of the human-readable asset is preserved.
        Required permission: ASSET_UPDATE or ADMIN_ALL
      operationId: replaceHumanReadable
      security:
        - jwt: []
      parameters:
        - name: id
          in: path
          description: IRI of the machine-readable asset
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Human-readable document
      responses:
        '200':
          description: OK — the human-readable asset content was replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      tags:
        - Assets
      summary: Download the human-readable representation linked to a machine-readable asset
      description: >
        Returns the binary content of the human-readable document linked to the asset.
        Required permission: ASSET_READ or ADMIN_ALL
      operationId: getHumanReadable
      security:
        - jwt: []
      parameters:
        - name: id
          in: path
          description: IRI of the machine-readable asset
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The human-readable document with its original Content-Type header
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /query:
    get:
      tags:
        - Query
      summary: Retrieve an HTML website to send openCypher queries to the Catalogue
      description: 'Required permission: QUERY_EXECUTE or ADMIN_ALL'
      operationId: querywebsite
      security:
        - jwt: []
      responses:
        '200':
          description: HTML document that contains a query field for openCypher queries.
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - Query
      summary: Send a query to the Catalogue
      description: >
        Required permission: QUERY_EXECUTE or ADMIN_ALL.


        The SPARQL backend is RDF-star (SPARQL-Star) aware. Credential claims are projected as
        reified triples annotated with `cred:credentialSubject`
        (`http://www.w3.org/2018/credentials#credentialSubject`): each claim triple `s p o`
        appears in the graph as `<< s p o >> <cred:credentialSubject> <subject>`. Discovery
        queries that target the credential claims must therefore reach into the reification, for
        example:


        `SELECT ?subject WHERE { << ?subject a <https://example.org/dcs/1#ContractTemplate> >>
        <http://www.w3.org/2018/credentials#credentialSubject> ?subject }`.


        Asserted (non-reified) triples emitted by the catalogue itself — such as the
        machine-readable ↔ human-readable link predicates — are queryable with plain SPARQL.


        Content negotiation: the response body shape is selected by the `Accept` header.
        `application/json` (the default) returns the catalogue's legacy `Results` envelope
        with a flat `items` array of variable→value maps. `application/sparql-results+json`
        returns the W3C SPARQL 1.1 Results JSON document (`head.vars` and
        `results.bindings` with typed `{type, value, datatype?, "xml:lang"?}` entries) as
        defined in https://www.w3.org/TR/sparql11-results-json/. The W3C format is only
        available when the active graph store is SPARQL-capable; other backends return
        `406 Not Acceptable`.
      operationId: query
      parameters:
        - in: query
          name: timeout
          schema:
            type: integer
            default: 5
          required: false
        - in: query
          name: withTotalCount
          schema:
            type: boolean
            default: true
          required: false
      security:
        - jwt: []
      requestBody:
        description: >-
          Raw query text. Use Content-Type to indicate the query language:
          "application/sparql-query" for SPARQL, "application/opencypher-query"
          for openCypher.
        required: true
        content:
          application/sparql-query:
            schema:
              type: string
              example: "SELECT ?s ?p ?o WHERE { ?s ?p ?o } LIMIT 10"
          application/opencypher-query:
            schema:
              type: string
              example: "MATCH (n:Resource) RETURN n.uri AS id, n.name AS name LIMIT 10"
      responses:
        '200':
          description: >-
            successful query. The response media type is selected by the
            client's `Accept` header: `application/json` returns the catalogue's
            legacy `Results` envelope, `application/sparql-results+json` returns
            the W3C SPARQL 1.1 Results JSON document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Results'
            application/sparql-results+json:
              schema:
                type: string
                description: >-
                  W3C SPARQL 1.1 Results JSON document. The body is a JSON
                  object with `head.vars` (list of projected variables) and
                  `results.bindings` (array of solution objects). Each binding
                  value is `{type, value}` with optional `datatype` or
                  `xml:lang`. See
                  https://www.w3.org/TR/sparql11-results-json/ for the full
                  schema.
                example: |
                  {
                    "head": { "vars": ["s","p","o"] },
                    "results": {
                      "bindings": [
                        {
                          "s": {"type":"uri","value":"http://example.org/service1"},
                          "p": {"type":"uri","value":"http://example.org/name"},
                          "o": {"type":"literal","value":"Example Service"}
                        }
                      ]
                    }
                  }
        '400': ## Malformed Message: The receveived request cannot be processed, either because its syntax is ## incorrect or forbidden query clauses are used. For instance, it is not allowed to manipulate data ## through the query endpoint
          $ref: '#/components/responses/ClientError'
        '406': ## Accept header asks for a representation the active graph store cannot produce
          ## (e.g. application/sparql-results+json against a non-SPARQL backend).
          $ref: '#/components/responses/ClientError'
        '408': ## Query Timeout: the query took longer than the configured timeout
          ## interval. The client needs to rewrite the query so it can be
          ## processed faster.
          $ref: '#/components/responses/ServerError'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/ServerError'
  /query/info:
    get:
      tags:
        - Query
      summary: Get information about the active query backend
      description: 'Required permission: QUERY_EXECUTE or ADMIN_ALL'
      operationId: queryInfo

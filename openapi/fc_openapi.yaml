  /verification:
    get:
      tags:
        - Verification
      summary: Show a HTML page to verify (portions of) a signed credential
      operationId: verifyPage
      security:
        - jwt: [ ]
      responses:
        '200':
          description: >-
            HTML document that contains a query field to verify (portions of)
            credentials.
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ClientError'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - Verification
      summary: >-
        Send a JSON-LD document to verify with the information from the
        Catalogue
      operationId: verify
      parameters:
        - name: verifySemantics
          in: query
          description: 'To verify credential semantics or not'
          required: false
          schema:
            type: boolean
            default: true
        - name: verifyVPSignature
          in: query
          description: 'To verify VP signature or not'
          required: false
          schema:
            type: boolean
            default: true  
        - name: verifyVCSignature
          in: query
          description: 'To verify VC signature or not'
          required: false
          schema:
            type: boolean
            default: true
        - name: requireBaseClass
          in: query
          description: >-
            When true, reject a credential whose subject type cannot be resolved
            to a base class in any active trust-framework bundle — HTTP 422 when
            semantic verification is enabled (the default), otherwise HTTP 400.
            When false (the default), credentials with unresolvable types are
            accepted with a null base class. Useful for cross-framework demos
            against the bundled gaia-x-2511 / mock-2026 bundles.
          required: false
          schema:
            type: boolean
            default: false
        - name: framework
          in: query
          description: >-
            Trust-framework bundle identifier for disambiguation. Ignored when
            exactly one bundle is active. Required when the credential type is
            resolvable in more than one active bundle (e.g. two bundles both
            declare a "Participant" base class).
          required: false
          schema:
            type: string
      requestBody:
        description: >-
          The credential to verify. For JSON-LD credentials, use application/json,
          application/vc+ld+json, or application/vp+ld+json. For JWT-wrapped
          credentials use application/vc+jwt (VC) or application/vp+jwt (VP) —
          these are IANA-registered types per W3C VC-JOSE-COSE and are issued by
          the live GXDCH Compliance Service. The ICAM 24.07 variants
          application/vc+ld+json+jwt and application/vp+ld+json+jwt are also
          accepted for backward compatibility but are not IANA-registered.
        content:
          application/json:
            schema:
              type: string
          application/ld+json:
            schema:
              type: string
          application/vc+ld+json:
            schema:
              type: string
          application/vp+ld+json:
            schema:
              type: string
          application/vc+jwt:
            schema:
              type: string
          application/vp+jwt:
            schema:
              type: string

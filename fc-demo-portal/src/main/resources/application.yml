server:
  port: 8088

spring:
  application:
    name: fc-demo-portal-app
  mvc:
    log-request-details: true
  main:
    allow-circular-references: true
  security:
    oauth2:
      client:
        registration:
          fc-client-oidc:
            provider: keycloak
            client-id: federated-catalogue 
            client-secret: "**********"
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            # No issuer-uri: Spring Boot always prefers it and fetches OIDC discovery at startup.
            # Keycloak advertises localhost (KC_HOSTNAME) while containers reach it via key-server,
            # so issuer-uri cannot work in Docker. Deployments (K8s) set issuer-uri via env instead.

federated-catalogue:
  base-uri: http://fc-server

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG

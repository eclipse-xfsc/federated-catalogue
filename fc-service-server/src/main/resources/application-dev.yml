# Development profile overrides.
# Activated via: -Dspring-boot.run.profiles=dev

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/${keycloak.realm}

keycloak:
  auth-server-url: http://localhost:8080

federated-catalogue:
  verification:
    doc-loader:
      # Override remote URLs with inline empty JSON-LD contexts.
      # Spring Boot merges maps across profiles, so we can't remove entries —
      # instead we replace the remote URLs with inline content that parses locally.
      additional-context:
        '[https://registry.lab.gaia-x.eu/development/api/trusted-shape-registry/v1/shapes/jsonld/trustframework#]': '{"@context": {}}'
        '[https://registry.lab.gaia-x.eu/v1/api/trusted-shape-registry/v1/shapes/jsonld/trustframework#]': '{"@context": {}}'
        '[https://w3id.org/gaia-x/2511#]': '{"@context": {}}'
      enable-http: false
      enable-local-cache: true

# Mock Trust Framework bundle
# This bundle IS the "call a GXDCH compliance service" code path; it targets a WireMock stub
# in local-dev and BDD environments (driven by @uses.compliance-mock scenarios).
# This bundle remains as the permanent
# local-dev / BDD compliance-stub path. No ontology or SHACL shapes: intentionally minimal.

id: mock-2026
family: mock
namespace: "https://example.com/mock/2026#"
validation_type: shacl

base_classes:
  MockParticipant:
    additional_roots: [ ]
    types: [ ]

properties:
  # Reuses the generic REST + JWT-VC compliance client against a WireMock stub that mimics the
  # GXDCH wire shape.
  client_type: jwt-vc-compliance
  api_version: "v2"
  service_url: "http://localhost"
  compliance_path: "/api/credential-offers/standard-compliance"
